<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body style="background-color: #212121; color: #fff;">
    

<script>
    const div = document.createElement("div") //div created is currently in memory and not rendered in the browser
    console.log(div);
    div.className= "main" //overwrites
    div.id=Math.round((Math.random()*10+1)) //overwrites
    div.setAttribute('title', 'new modified title') //Set attribute without taking a previous value, doesnt overwrite.
    div.style.backgroundColor="green"
    div.style.padding="12px"
    // div.innerText = "LoL" //This method overwrites, which is why method below can be better
    const addText = document.createTextNode("LoL")
    div.appendChild(addText)

    //Attaching to the browser
    document.body.appendChild(div)



    
</script>
</body>
</html>
